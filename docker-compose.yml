services:
  dev:
    image: ${IMAGE_REPOSITORY:?IMAGE_REPOSITORY is required}:${IMAGE_VERSION:?IMAGE_VERSION is required}
    platform: ${IMAGE_PLATFORM:?IMAGE_PLATFORM is required}
    build:
      context: .
      args:
        NODE_VERSION: ${NODE_VERSION:?NODE_VERSION is required}
        PNPM_VERSION: ${PNPM_VERSION:?PNPM_VERSION is required}
        YARN_VERSION: ${YARN_VERSION:?YARN_VERSION is required}
        BUN_VERSION: ${BUN_VERSION:?BUN_VERSION is required}
        UV_VERSION: ${UV_VERSION:?UV_VERSION is required}
        PYTHON_VERSION: ${PYTHON_VERSION:?PYTHON_VERSION is required}
        GO_VERSION: ${GO_VERSION:?GO_VERSION is required}
        RUST_VERSION: ${RUST_VERSION:?RUST_VERSION is required}
        GH_VERSION: ${GH_VERSION:?GH_VERSION is required}
        LAZYGIT_VERSION: ${LAZYGIT_VERSION:?LAZYGIT_VERSION is required}
        DELTA_VERSION: ${DELTA_VERSION:?DELTA_VERSION is required}
        STARSHIP_VERSION: ${STARSHIP_VERSION:?STARSHIP_VERSION is required}
        ATUIN_VERSION: ${ATUIN_VERSION:?ATUIN_VERSION is required}
        YAZI_VERSION: ${YAZI_VERSION:?YAZI_VERSION is required}
        CHEZMOI_VERSION: ${CHEZMOI_VERSION:?CHEZMOI_VERSION is required}
        NVIM_VERSION: ${NVIM_VERSION:?NVIM_VERSION is required}
        AST_GREP_VERSION: ${AST_GREP_VERSION:?AST_GREP_VERSION is required}
        CODEX_VERSION: ${CODEX_VERSION:?CODEX_VERSION is required}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:?CLAUDE_CODE_VERSION is required}
        OPENCODE_VERSION: ${OPENCODE_VERSION:?OPENCODE_VERSION is required}
        OPENSPEC_VERSION: ${OPENSPEC_VERSION:?OPENSPEC_VERSION is required}
        TZ: ${TZ:-Asia/Shanghai}
    init: true
    tty: true
    stdin_open: true
    working_dir: /workspace
    network_mode: host
    security_opt:
      - seccomp=unconfined
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      SSH_AUTH_SOCK: /agent.sock
      GIT_SSH_COMMAND: ssh -o StrictHostKeyChecking=accept-new
      AITEM_TERMINAL_SESSION_ID: ${AITEM_TERMINAL_SESSION_ID:-}
      AITEM_NOTIFY_URL: ${AITEM_NOTIFY_URL:-}
      AITEM_NOTIFY_TOKEN: ${AITEM_NOTIFY_TOKEN:-}
      CHEZMOI_APPLY: ${CHEZMOI_APPLY:-1}
      CHEZMOI_STARTUP_PULL: ${CHEZMOI_STARTUP_PULL:-0}
      CHEZMOI_REPO: ${CHEZMOI_REPO:-git@github.com:zhouatie/dotfiles.git}
      CHEZMOI_BRANCH: ${CHEZMOI_BRANCH:-}
      CHEZMOI_TARGETS: ${CHEZMOI_TARGETS:-.zshrc .config/starship.toml .config/bat .config/lazygit/config.yml .config/openspec/config.yaml .config/atuin/config.toml .config/yazi .config/tmux/tmux.conf .config/nvim .config/git}
      CHEZMOI_EXCLUDE_TARGETS: ${CHEZMOI_EXCLUDE_TARGETS:-.config/nvim/.git .config/nvim/.claude}
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - /run/host-services/ssh-auth.sock:/agent.sock
      - ssh-state:/home/dev/.ssh
      - codex-state:/home/dev/.codex
      - chezmoi-source:/home/dev/.local/share/chezmoi
      - nvim-data:/home/dev/.local/share/nvim
      - nvim-state:/home/dev/.local/state/nvim
      - dev-cache:/home/dev/.cache
      - npm-cache:/home/dev/.npm
      - pnpm-store:/home/dev/.pnpm-store
      - cargo-registry:/home/dev/.cargo/registry
      - go-mod-cache:/home/dev/go/pkg/mod
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  dev-cache:
  ssh-state:
  codex-state:
  chezmoi-source:
  nvim-data:
  nvim-state:
  npm-cache:
  pnpm-store:
  cargo-registry:
  go-mod-cache:
