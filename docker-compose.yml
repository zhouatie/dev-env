services:
  dev:
    image: ghcr.io/zhouatie/atie-dev-env:2026-06-12.6
    platform: linux/arm64
    build:
      context: .
      args:
        NODE_VERSION: "25.8.2"
        PNPM_VERSION: "10.33.0"
        YARN_VERSION: "1.22.19"
        BUN_VERSION: "1.3.5"
        UV_VERSION: "0.11.17"
        PYTHON_VERSION: "3.14.3"
        GO_VERSION: "1.25.0"
        RUST_VERSION: "1.94.1"
        CHEZMOI_VERSION: "2.70.0"
        NVIM_VERSION: "0.12.0"
        TZ: Asia/Shanghai
    init: true
    tty: true
    stdin_open: true
    working_dir: /workspace
    network_mode: host
    environment:
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      SSH_AUTH_SOCK: /agent.sock
      GIT_SSH_COMMAND: ssh -o StrictHostKeyChecking=accept-new
      CHEZMOI_APPLY: ${CHEZMOI_APPLY:-1}
      CHEZMOI_STARTUP_PULL: ${CHEZMOI_STARTUP_PULL:-0}
      CHEZMOI_REPO: ${CHEZMOI_REPO:-git@github.com:zhouatie/dotfiles.git}
      CHEZMOI_BRANCH: ${CHEZMOI_BRANCH:-}
      CHEZMOI_TARGETS: ${CHEZMOI_TARGETS:-.zshrc .config/starship.toml .config/bat .config/lazygit/config.yml .config/openspec/config.yaml .config/atuin/config.toml .config/yazi .config/tmux/tmux.conf .config/nvim .config/git/ignore}
      CHEZMOI_EXCLUDE_TARGETS: ${CHEZMOI_EXCLUDE_TARGETS:-.config/nvim/.git .config/nvim/.claude}
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - /run/host-services/ssh-auth.sock:/agent.sock
      - ssh-state:/home/dev/.ssh
      - codex-state:/home/dev/.codex
      - chezmoi-source:/home/dev/.local/share/chezmoi
      - nvim-data:/home/dev/.local/share/nvim
      - nvim-state:/home/dev/.local/state/nvim
      - dev-cache:/home/dev/.cache
      - npm-cache:/home/dev/.npm
      - pnpm-store:/home/dev/.pnpm-store
      - cargo-registry:/home/dev/.cargo/registry
      - go-mod-cache:/home/dev/go/pkg/mod
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  dev-cache:
  ssh-state:
  codex-state:
  chezmoi-source:
  nvim-data:
  nvim-state:
  npm-cache:
  pnpm-store:
  cargo-registry:
  go-mod-cache:
